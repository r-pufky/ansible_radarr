---
###############################################################################
# Backup
###############################################################################
# Only backup SQLite databases and configuration file.

- name: 'Backup | fact | parse location'
  ansible.builtin.set_fact:
    radarr__archive: '{{ "/tmp/" ~ radarr__srv._start ~ "_config.tar.xz" }}'

- name: 'Backup | warning | ⚠ Metadata Enabled ⚠'
  when: radarr__cfg._backup_metadata
  ansible.builtin.debug:
    msg: |

      ⚠ Metadata Enabled ⚠

      /var/opt/radarr/MediaCover may be Multi-GB. A backup effectively doubles
      the space used during the process and may fail if low disk space.

      Transfer may be very long.


- name: 'Backup | filesystem | set backup location'
  when:
    radarr__cfg._backup_d | length > 0 and radarr__cfg._backup_d != '/tmp'
  delegate_to: 'localhost'
  run_once: true
  ansible.builtin.file:
    path: '{{ radarr__cfg._backup_d }}'
    mode: '0750'
    state: directory

- name: '{{  "Backup | cmd | create " ~ radarr__archive }}'
  ansible.builtin.shell: '{{
      "/usr/bin/tar " ~
      ("--exclude=MediaCover" if not radarr__cfg._backup_metadata else "") ~
      " -cvJf " ~ radarr__archive ~ " ."
    }}'
  args:
    executable: '/bin/bash'
    chdir: '{{ radarr___app._var_d }}'
  changed_when: true

- name:
    '{{ "Backup | fetch | " ~ radarr__archive }}'
  ansible.posix.synchronize:
    mode: pull
    src: '{{ radarr__archive }}'
    dest: '{{ radarr__cfg._backup_d ~ "/" }}'

- name: 'Backup | filesystem | cleanup'
  ansible.builtin.file:
    path: '{{ "/tmp/" ~ radarr__srv._start ~ "_config.tar.xz" }}'
    state: 'absent'

- name: 'Backup | start'
  ansible.builtin.import_tasks: 'start.yml'

- name: 'Backup | success ✔'
  ansible.builtin.meta: 'end_host'

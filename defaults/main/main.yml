---
###############################################################################
# Feature Flags
###############################################################################

# 1. Backup config to radarr_cfg_backup_d?
#
# Backup existing config data directory and exit role. Creates archive of
# /var/opt/radarr. radarr_cfg_backup_d created if non-existent. Services
# stopped, files backed up, services started.
#
# Default: False.
radarr_flg_backup: false

# 2. Restore config from backup?
#
# Restore config data directory and exit role. Extracts latest backup archive
# to /var/opt/radarr. Services stopped, files backed up, services started.
#
# Default: False.
radarr_flg_restore: false

# 3. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions.
#
# Default: True.
radarr_flg_maintenance: true

# 4. Install application?
#
# Creates required default directories, users, install packages, download
# software, autogenerates config.xml if not specified, update and start
# services.
#
# Default: True.
radarr_flg_install: true

# 5. Set configuration data?
#
# Overwrite config data directory sourced from radarr_cfg_d. Use backup and
# restore to manage configuration data. Stops service, deploys user config
# data, updates and starts services.
#
# Default: False.
radarr_flg_config: false

###############################################################################
# Service
###############################################################################

# Radarr Release.
#
# Versions (Schematic):
#       MAJOR: Unsafe - Usually requires major role changes; only default MAJOR
#              version is supported.
#       MINOR: Safe - Usually requires no role updates. Changes usually
#              constrained to internal changes requiring no config file or
#              dependency changes.
#       PATCH: Safe - Usually requires no role updates.
#   RECOMMEND: Only increment MINOR.PATCH.
#
# Default: 'v6.1.1.10360'.
#
# Reference:
# * https://github.com/Radarr/Radarr/releases/latest
radarr_srv_version: 'v6.1.1.10360'

# Github access token (radarr).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
radarr_srv_token: ''

# User that Radarr will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
radarr_srv_user: 'media'

# Group that Radarr will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
radarr_srv_group: 'media'

###############################################################################
# Config
###############################################################################

# Radarr configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use).
#
# Sets data in /var/opt/radarr/*. SQlite databases should be included or use
# restore. Files not sourced will be removed (metadata MediaCover directory
# will not be touched). See templates/{default,postgres} for examples.
#
# Use radarr_flg_backup, radarr_flg_restore to include MediaCover metadata.
#
# radarr_flg_config=true:
# ⋮radarr_cfg_d='' - Remove existing files.
# ⋮radarr_cfg_d='{DIR}' - Replace existing files with sourced template dir.
# radarr_flg_config=false:
# ⋮radarr_cfg_d=* - Do nothing.
#
# radarr_cfg_d: 'host_vars/radarr.example.com/config'
#
# Default: '' (use minimally configured default).
radarr_cfg_d: ''

# Role backup location.
#
# All backup operations for a given role execution are stored locally on
# ansible controller with the format 'YYYY-MM-DDTHHMMSS_{FILE}'.
#
# radarr_cfg_backup_d: 'data/radarr'
#
# Default: ''
radarr_cfg_backup_d: ''

# Backup metadata (MediaCover) directory?
#
# Multi-GB. Safe to delete. Will cause large backup/restore transfers or
# re-download of metadata when service is restarted. Alternatively externally
# manage /var/opt/radarr/MediaCover.
#
# Default: True.
radarr_cfg_backup_metadata: true

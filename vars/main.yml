---
###############################################################################
# Radarr Role Options
###############################################################################
# Radarr uses generic Servarr installation scripts.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/Servarr/Wiki/blob/master/servarr
# * https://github.com/Radarr/Radarr/releases

radarr___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-24',
    _debian='trixie',
    _app='v6.0.4.10291',
    _script_release='3.0.12',
    _script_date='2024-04-09',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

radarr___packages:
  - 'sqlite3'  # Radarr DB.
  - 'gnupg2'  # GPG for certificates.
  - 'ca-certificates'  # Up to date certificates for certificate validation.
  - 'libicu76'  # International Unicode support for .NET.

  # Ansible.
  - 'xz-utils'  # xz archives.
  - 'rsync'  # ansible.posix.synchronize.

###############################################################################
# Radarr GitHub Options
###############################################################################
# Reference:
# * https://github.com/Radarr/Radarr/releases/latest

radarr___repo_url:
  'https://github.com/Radarr/Radarr/releases/download/'
radarr___package: '{{
    "Radarr.master." ~ radarr___release._app[1:] ~ ".linux-core-x64.tar.gz"
  }}'

radarr___app: "{{ {} | r_pufky.data.v3(

    _version=radarr___release._app,
    _package=radarr___package,
    _var_dir='/var/opt/radarr',
    _cfg='/var/opt/radarr/config.xml',
    _opt_dir='/opt/radarr',
    _src_dir='/opt/radarr/src',
    _app='/opt/radarr/src/' ~ radarr___release._app,
    _service='/etc/systemd/system/radarr.service',
    _base_url=radarr___repo_url,
    _url=radarr___repo_url ~ radarr___release._app ~ '/' ~ radarr___package,
  ) }}"

###############################################################################
# Default Radarr User/Group
###############################################################################

radarr___group:
  name: 'media'
  gid: 5555

radarr___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
